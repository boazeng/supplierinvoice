# bookkeeping.newavera.co.il → SupplierInvoice app (uvicorn on 127.0.0.1:8000)
# Sits behind Cloudflare (proxied). Separate file from land.conf — the Land
# site config is left untouched. Filename "zz-" so it loads after land.conf
# and land's :443 block stays the positional default for unmatched SNI.
# Deployed to: /etc/nginx/conf.d/zz-bookkeeping.conf

# HTTP — redirect to HTTPS
server {
    listen 80;
    server_name bookkeeping.newavera.co.il;
    return 301 https://bookkeeping.newavera.co.il$request_uri;
}

# HTTPS — reverse proxy to the invoice app
server {
    listen 443 ssl;
    server_name bookkeeping.newavera.co.il;

    # Reuses the existing Let's Encrypt cert. The end-user TLS is terminated
    # by Cloudflare; this cert only secures the Cloudflare→origin hop.
    ssl_certificate     /etc/letsencrypt/live/land.newavera.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/land.newavera.co.il/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }
}
