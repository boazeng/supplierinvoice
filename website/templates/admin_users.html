<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול משתמשים</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/tact-header.css?v=2">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');
        /* TACT brand palette */
        :root { --accent:#1F3A5F; --bg:#FAF9F5; --card:#FFFEFB; --text:#2A2A28;
                --muted:#9B9486; --border:#E7E2D6; --danger:#D64A2E; --ok:#2F8F5B; }
        * { box-sizing: border-box; }
        body { font-family: Heebo, Arial, sans-serif; background: var(--bg);
               color: var(--text); margin: 0; padding: 0; }
        .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
        header { display: flex; justify-content: space-between; align-items: center;
                 margin-bottom: 20px; }
        h1 { font-size: 1.3rem; margin: 0; }
        a.back { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
        .card { background: var(--card); border-radius: 12px; padding: 20px;
                box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 18px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: right; padding: 10px 8px; border-bottom: 1px solid var(--border); }
        th { font-size: 0.8rem; color: var(--muted); }
        select, input { padding: 6px 8px; border: 1px solid var(--border);
                        border-radius: 6px; font-family: inherit; }
        button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer;
                 font-family: inherit; font-size: 0.85rem; }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-del { background: var(--danger); color: #fff; }
        .btn-add { background: var(--ok); color: #fff; padding: 8px 20px; }
        .row-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .msg { padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; display: none; }
        .msg.ok { background: #dcfce7; color: #166534; }
        .msg.err { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
<header class="tact-bar">
    <span class="tact-logo">
        <span class="tact-logo-row">
            <span class="tact-logo-mark">
                <span class="tact-logo-seg"><span class="tact-logo-letter">T</span><span class="tact-logo-dot"></span></span>
                <span class="tact-logo-seg"><span class="tact-logo-letter">A</span><span class="tact-logo-dot"></span></span>
                <span class="tact-logo-seg"><span class="tact-logo-letter">C</span><span class="tact-logo-dot"></span></span>
                <span class="tact-logo-seg"><span class="tact-logo-letter">T</span></span>
            </span>
            <span class="tact-logo-word">bookkeeping</span>
        </span>
    </span>
    <nav class="tact-nav">
        <a href="/">חשבוניות ספק</a>
        <a href="/ledger">ספרי הנהלת חשבונות</a>
        <a id="admin-link" href="/admin/users" class="active">ניהול משתמשים</a>
    </nav>
    <span class="tact-account">
        <span id="current-user" class="tact-chip"></span>
        <a href="/logout" class="tact-logout">התנתק</a>
    </span>
</header>
<div class="wrap">

    <div id="msg" class="msg"></div>

    <div class="card">
        <h3 style="margin-top:0">משתמשים מורשים</h3>
        <table>
            <thead><tr><th>אימייל</th><th>כינוי</th><th>תפקיד</th><th>פעיל</th><th></th></tr></thead>
            <tbody id="users-body"></tbody>
        </table>
    </div>

    <div class="card">
        <h3 style="margin-top:0">הוספת משתמש</h3>
        <div class="row-form">
            <input id="new-email" type="email" placeholder="אימייל Gmail" style="flex:2">
            <input id="new-name" type="text" placeholder="כינוי (לא חובה)" style="flex:1">
            <select id="new-role"></select>
            <button class="btn-add" onclick="addUser()">הוסף</button>
        </div>
    </div>
</div>

<script>
let ROLES = ['admin', 'approver', 'user'];

function showMsg(text, ok) {
    const m = document.getElementById('msg');
    m.textContent = text;
    m.className = 'msg ' + (ok ? 'ok' : 'err');
    m.style.display = 'block';
    setTimeout(() => { m.style.display = 'none'; }, 4000);
}

function roleSelect(value) {
    return ROLES.map(r => `<option value="${r}"${r === value ? ' selected' : ''}>${r}</option>`).join('');
}

async function load() {
    const res = await fetch('/auth/users');
    if (!res.ok) { showMsg('שגיאה בטעינת המשתמשים', false); return; }
    const data = await res.json();
    ROLES = data.roles || ROLES;
    document.getElementById('new-role').innerHTML = roleSelect('user');
    const body = document.getElementById('users-body');
    body.innerHTML = '';
    for (const u of data.users) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${u.email}</td>
            <td><input value="${(u.name || '').replace(/"/g, '&quot;')}" data-f="name" placeholder="כינוי" style="width:120px"></td>
            <td><select data-f="role">${roleSelect(u.role)}</select></td>
            <td style="text-align:center"><input type="checkbox" data-f="active"${u.active ? ' checked' : ''}></td>
            <td>
                <button class="btn-save" onclick="saveUser('${u.email}', this)">שמור</button>
                <button class="btn-del" onclick="delUser('${u.email}')">מחק</button>
            </td>`;
        body.appendChild(tr);
    }
}

async function saveUser(email, btn) {
    const tr = btn.closest('tr');
    const get = f => tr.querySelector(`[data-f="${f}"]`);
    const res = await fetch('/auth/users', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            email, name: get('name').value, role: get('role').value,
            active: get('active').checked,
        }),
    });
    const d = await res.json().catch(() => ({}));
    if (res.ok) { showMsg('נשמר: ' + email, true); load(); }
    else showMsg(d.detail || 'שגיאה', false);
}

async function delUser(email) {
    if (!confirm('למחוק את ' + email + '?')) return;
    const res = await fetch('/auth/users/delete', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email}),
    });
    const d = await res.json().catch(() => ({}));
    if (res.ok) { showMsg('נמחק: ' + email, true); load(); }
    else showMsg(d.detail || 'שגיאה', false);
}

async function addUser() {
    const email = document.getElementById('new-email').value.trim();
    if (!email) { showMsg('הזן אימייל', false); return; }
    const res = await fetch('/auth/users', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            email, name: document.getElementById('new-name').value,
            role: document.getElementById('new-role').value, active: true,
        }),
    });
    const d = await res.json().catch(() => ({}));
    if (res.ok) {
        showMsg('נוסף: ' + email, true);
        document.getElementById('new-email').value = '';
        document.getElementById('new-name').value = '';
        load();
    } else showMsg(d.detail || 'שגיאה', false);
}

load();
</script>
<script src="/static/js/tact-header.js"></script>
</body>
</html>
