<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קליטת חשבוניות ספק</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="apple-touch-icon" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/main.css?v=tact22">
    <link rel="stylesheet" href="/static/css/tact-header.css?v=3">
</head>
<body>
    <!-- TACT header — page tabs -->
    <header class="tact-bar">
        <span class="tact-logo">
            <span class="tact-logo-row">
                <span class="tact-logo-mark">
                    <span class="tact-logo-seg"><span class="tact-logo-letter">T</span><span class="tact-logo-dot"></span></span>
                    <span class="tact-logo-seg"><span class="tact-logo-letter">A</span><span class="tact-logo-dot"></span></span>
                    <span class="tact-logo-seg"><span class="tact-logo-letter">C</span><span class="tact-logo-dot"></span></span>
                    <span class="tact-logo-seg"><span class="tact-logo-letter">T</span></span>
                </span>
                <span class="tact-logo-word">bookkeeping</span>
            </span>
        </span>
        <nav class="tact-nav">
            <a href="/" class="active">חשבוניות ספק</a>
            <a href="/ledger">ספרי הנהלת חשבונות</a>
            <a id="admin-link" href="/admin/users" style="display:none">ניהול משתמשים</a>
        </nav>
        <span class="tact-account">
            <button id="btn-sync" class="btn btn-secondary btn-sm" onclick="app.syncPriority()">סנכרון Priority</button>
            <span id="sync-status" class="sync-badge">לא סונכרן</span>
            <span id="current-user" class="tact-chip"></span>
            <a href="/logout" class="tact-logout">התנתק</a>
        </span>
    </header>

    <main class="main-container">
        <!-- Upload Area — compact bar -->
        <section class="upload-bar">
            <div id="drop-zone" class="drop-zone-compact">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span>גרור חשבונית לכאן או</span>
                <label class="btn btn-primary btn-sm upload-btn">
                    בחר קובץ
                    <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.tiff,.tif" hidden>
                </label>
                <span class="drop-zone-hint">PDF, PNG, JPG, TIFF</span>
            </div>
            <button id="btn-fetch-email" class="btn btn-secondary btn-sm" style="margin-top:8px"
                    onclick="app.fetchEmail()">📧 משוך חשבוניות ממייל</button>
            <button id="btn-test-filing" class="btn btn-secondary btn-sm" style="margin-top:8px;background:#6b7280"
                    onclick="app.createFilingTest()">🧪 חשבונית בדיקה לתיוק</button>
        </section>

        <!-- Status Filter Tabs -->
        <section class="filter-tabs">
            <button class="tab active" data-status="" data-label="הכל" onclick="app.filterByStatus(this, '', '')">הכל</button>
            <button class="tab" data-status="pending_submission" data-label="קליטה" onclick="app.filterByStatus(this, 'pending_submission', '')">קליטה</button>
            <button class="tab" data-status="pending_filing" data-label="תיוק" onclick="app.filterByStatus(this, 'pending_filing', '')">תיוק</button>
            <button class="tab" data-status="on_hold" data-label="המתנה" onclick="app.filterByStatus(this, 'on_hold', '')">המתנה</button>
            <button class="tab" data-status="cancelled" data-label="בוטל" onclick="app.filterByStatus(this, 'cancelled', '')">בוטל</button>
        </section>

        <!-- Invoice Table -->
        <section class="invoice-table-wrap">
            <table class="invoice-table" id="invoice-table">
                <thead>
                    <tr>
                        <th>שם ספק</th>
                        <th>מס' חשבונית</th>
                        <th>סה"כ לפני מע"מ</th>
                        <th>סה"כ כולל מע"מ</th>
                        <th>תאריך העלאה</th>
                        <th>פענוח</th>
                        <th>סטטוס המתנה</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="invoice-list">
                    <tr><td colspan="8" class="empty-state">אין חשבוניות להצגה</td></tr>
                </tbody>
            </table>
        </section>

        <!-- Invoice Detail Modal -->
        <div id="invoice-modal" class="modal" style="display:none;">
            <div class="modal-overlay" onclick="app.closeModal()"></div>
            <div class="modal-content" id="modal-content">
                <div class="modal-toolbar">
                    <span class="tact-logo" style="flex-shrink:0">
                        <span class="tact-logo-row">
                            <span class="tact-logo-mark">
                                <span class="tact-logo-seg"><span class="tact-logo-letter">T</span><span class="tact-logo-dot"></span></span>
                                <span class="tact-logo-seg"><span class="tact-logo-letter">A</span><span class="tact-logo-dot"></span></span>
                                <span class="tact-logo-seg"><span class="tact-logo-letter">C</span><span class="tact-logo-dot"></span></span>
                                <span class="tact-logo-seg"><span class="tact-logo-letter">T</span></span>
                            </span>
                            <span class="tact-logo-word">bookkeeping</span>
                        </span>
                    </span>
                    <div style="display:flex;align-items:center;gap:10px">
                        <!-- כפתורי פעולת קובץ — תמיד גלויים -->
                        <button class="btn btn-sm" style="background:var(--bg-tertiary);color:var(--text-secondary);border:1px solid var(--border)" onclick="app.testOcrCrop(app.activeHighlight)" id="btn-ocr-test">
                            🔍 קרא ספק
                        </button>
                        <!-- כפתורי פעולה — נראות לפי סטטוס (app.renderModal) -->
                        <div id="action-buttons" class="action-buttons">
                            <button id="btn-approve-intake" class="btn btn-success btn-sm" style="display:none"
                                    onclick="app.changeStatus('pending_extraction','אושר לפענוח')">אשר</button>
                            <button id="btn-extract" class="btn btn-primary btn-sm" style="display:none"
                                    onclick="app.extractInvoice()">פענח</button>
                            <button id="btn-submit" class="btn btn-sm" style="display:none;border:1.5px solid #1F3A5F;color:#1F3A5F"
                                    onclick="app.approveInvoice()">אשר וקלוט בפריורטי</button>
                            <button id="btn-file" class="btn btn-success btn-sm" style="display:none"
                                    onclick="app.fileToLedger()">תייק בספרי הנהלת חשבונות</button>
                            <button id="btn-restore" class="btn btn-primary btn-sm" style="display:none"
                                    onclick="app.changeStatus('pending_approval','הוחזר לאישור')">החזר לאישור</button>
                            <button id="btn-hold" class="btn btn-sm" style="display:none;border:1.5px solid #1F3A5F;color:#1F3A5F"
                                    onclick="app.changeStatus('on_hold','הועבר להמתנה')">העבר להמתנה</button>
                            <button id="btn-clear-extraction" class="btn btn-sm" style="border:1.5px solid #1F3A5F;color:#1F3A5F"
                                    onclick="app.clearExtraction()">מחק פענוח</button>
                        </div>
                        <button id="expand-icon" title="מסך מלא" onclick="app.toggleBrowserFullscreen()"
                                style="background:none;border:none;color:var(--text-secondary);font-size:1.3rem;cursor:pointer;padding:0 4px;line-height:1">⛶</button>
                        <button class="modal-close" onclick="app.closeModal()">&times;</button>
                        <!-- "פענוח חוזר" — אחרי X, כך שהוא הכפתור השמאלי ביותר בסרגל (בגובה הכותרת, מעל ה-iframe) -->
                        <button class="btn btn-sm" style="border:1.5px solid #1F3A5F;color:#1F3A5F;background:#FFFEFB" onclick="app.reextractInvoice()" id="btn-reextract">
                            פענוח חוזר
                        </button>
                    </div>
                </div>
                <div class="modal-body">
                    <!-- עמודה 1: תצוגת קובץ -->
                    <div class="preview-pane" id="preview-pane">
                        <div class="preview-container" id="preview-container">
                            <iframe id="file-preview-iframe" class="file-preview" style="display:none"></iframe>
                            <img id="file-preview-img" class="file-preview" style="display:none; object-fit:contain" />
                            <div id="highlight-box-supplier" class="highlight-box highlight-supplier" style="display:none" data-target="supplier">
                                <div class="highlight-label">ח.פ / ע.מ ספק</div>
                                <div class="resize-handle resize-handle-br"></div>
                            </div>
                            <div id="highlight-box-customer" class="highlight-box highlight-customer" style="display:none" data-target="customer">
                                <div class="highlight-label">ח.פ / ע.מ לקוח</div>
                                <div class="resize-handle resize-handle-br"></div>
                            </div>
                            <div id="highlight-box-allocation" class="highlight-box highlight-allocation" style="display:none" data-target="allocation">
                                <div class="highlight-label">מספר הקצאה</div>
                                <div class="resize-handle resize-handle-br"></div>
                            </div>
                        </div>
                    </div>
                    <!-- עמודה 2: נתוני חשבונית + פקודת יומן -->
                    <div class="right-pane">
                        <div class="data-pane">
                            <div class="data-pane-scroll">
                                <div id="extracted-data"></div>
                                <div id="validation-warnings" class="warnings-box" style="display:none;">
                                    <h4>אזהרות</h4>
                                    <ul id="warnings-list"></ul>
                                </div>
                            </div>
                        </div>
                        <div class="journal-pane">
                            <div id="transaction-preview"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/static/js/app.js?v=tx37"></script>
    <script src="/static/js/tact-header.js"></script>
</body>
</html>
